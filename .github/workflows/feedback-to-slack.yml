name: PR Feedback to Slack

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

jobs:
  comment-feedback:
    # Only run for non-bot comments on PRs
    if: >
      github.event.comment.user.login != 'github-actions[bot]' &&
      (
        github.event_name == 'pull_request_review_comment' ||
        (github.event_name == 'issue_comment' && github.event.issue.pull_request)
      )
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      issues: read
    steps:
      - name: Check if related to Claude
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request_review_comment" ]; then
            # Review comments are threaded — check if parent is by the bot
            REPLY_TO="${{ github.event.comment.in_reply_to_id }}"
            if [ -z "$REPLY_TO" ]; then
              echo "Not a reply to an existing comment"
              echo "is_claude=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            PARENT=$(gh api "repos/${REPO}/pulls/comments/${REPLY_TO}")
            PARENT_LOGIN=$(echo "$PARENT" | jq -r '.user.login')

            if [ "$PARENT_LOGIN" != "github-actions[bot]" ]; then
              echo "Parent comment not by Claude: ${PARENT_LOGIN}"
              echo "is_claude=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            PARENT_PREVIEW=$(echo "$PARENT" | jq -r '.body' | head -c 200)
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "pr_url=${{ github.event.pull_request.html_url }}" >> "$GITHUB_OUTPUT"

          else
            # Issue comments (top-level PR comments) are flat — check if one
            # of the last 3 comments before this one was by the bot
            PR_NUMBER="${{ github.event.issue.number }}"
            CURRENT_ID="${{ github.event.comment.id }}"

            PREV_COMMENTS=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments?per_page=100" \
              --jq "[.[] | select(.id < ${CURRENT_ID})]")

            RECENT_BOT=$(echo "$PREV_COMMENTS" | jq '.[-3:] | any(.user.login == "github-actions[bot]")')
            if [ "$RECENT_BOT" != "true" ]; then
              echo "No recent Claude comment on this PR"
              echo "is_claude=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            PARENT_PREVIEW=$(echo "$PREV_COMMENTS" \
              | jq -r '[.[] | select(.user.login == "github-actions[bot]")] | last | .body' \
              | head -c 200)
            echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "pr_url=${{ github.event.issue.html_url }}" >> "$GITHUB_OUTPUT"
          fi

          echo "is_claude=true" >> "$GITHUB_OUTPUT"
          {
            echo "parent_preview<<GHEOF"
            echo "$PARENT_PREVIEW"
            echo "GHEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Notify Slack
        if: steps.check.outputs.is_claude == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          PR_TITLE: ${{ github.event.pull_request.title || github.event.issue.title }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "::warning::SLACK_WEBHOOK_URL secret is not set"
            exit 0
          fi

          COMMENTER="${{ github.event.comment.user.login }}"
          BODY=$(printf '%s' "$COMMENT_BODY" | head -c 300)
          PR_NUM="${{ steps.check.outputs.pr_number }}"
          PR_URL="${{ steps.check.outputs.pr_url }}"
          PARENT="${{ steps.check.outputs.parent_preview }}"

          PAYLOAD=$(jq -n \
            --arg commenter "$COMMENTER" \
            --arg body "$BODY" \
            --arg pr_url "$PR_URL" \
            --arg pr_num "$PR_NUM" \
            --arg pr_title "$PR_TITLE" \
            --arg parent "$PARENT" \
            '{
              blocks: [
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: ":speech_balloon: *\($commenter)* replied to Claude'\''s review on <\($pr_url)|#\($pr_num) \($pr_title)>\n>>>\($body)"
                  }
                },
                {
                  type: "context",
                  elements: [{
                    type: "mrkdwn",
                    text: ("_In response to:_ " + ($parent | .[0:150]))
                  }]
                }
              ]
            }')

          curl -sf -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$SLACK_WEBHOOK_URL"

  reaction-feedback:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      issues: read
    steps:
      - name: Poll reactions on Claude comments
        env:
          GH_TOKEN: ${{ github.token }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "::warning::SLACK_WEBHOOK_URL secret is not set"
            exit 0
          fi

          SINCE=$(date -u -d '16 minutes ago' +%Y-%m-%dT%H:%M:%SZ)
          REPO_URL="https://github.com/${REPO}"

          map_emoji() {
            case "$1" in
              "+1") echo ":thumbsup:" ;; "-1") echo ":thumbsdown:" ;;
              "laugh") echo ":laughing:" ;; "hooray") echo ":tada:" ;;
              "confused") echo ":confused:" ;; "heart") echo ":heart:" ;;
              "rocket") echo ":rocket:" ;; "eyes") echo ":eyes:" ;;
              *) echo ":$1:" ;;
            esac
          }

          notify_slack() {
            local emoji="$1" user="$2" pr_num="$3" pr_title="$4" preview="$5"

            PAYLOAD=$(jq -n \
              --arg emoji "$emoji" \
              --arg user "$user" \
              --arg pr_url "${REPO_URL}/pull/${pr_num}" \
              --arg pr_num "$pr_num" \
              --arg pr_title "$pr_title" \
              --arg preview "$preview" \
              '{
                blocks: [
                  {
                    type: "section",
                    text: {
                      type: "mrkdwn",
                      text: "\($emoji) *\($user)* reacted to Claude'\''s review on <\($pr_url)|#\($pr_num) \($pr_title)>"
                    }
                  },
                  {
                    type: "context",
                    elements: [{
                      type: "mrkdwn",
                      text: ("_Claude'\''s comment:_ " + ($preview | .[0:150]))
                    }]
                  }
                ]
              }')

            curl -sf -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$SLACK_WEBHOOK_URL"
          }

          check_reactions() {
            local comment_id="$1" api_path="$2" pr_num="$3" pr_title="$4" preview="$5"

            gh api "repos/${REPO}/${api_path}/${comment_id}/reactions" --paginate \
              --jq ".[] | select(.created_at > \"${SINCE}\" and .user.login != \"github-actions[bot]\") | [.user.login, .content] | @tsv" \
            2>/dev/null | while IFS=$'\t' read -r user content; do
              [ -n "$user" ] || continue
              notify_slack "$(map_emoji "$content")" "$user" "$pr_num" "$pr_title" "$preview"
            done
          }

          # Iterate over open PRs and check Claude's comments for new reactions
          gh pr list --state open --json number,title --limit 50 | jq -c '.[]' | while read -r pr; do
            PR_NUM=$(echo "$pr" | jq -r '.number')
            PR_TITLE=$(echo "$pr" | jq -r '.title')

            # Top-level PR comments (issue comments)
            gh api "repos/${REPO}/issues/${PR_NUM}/comments" --paginate \
              --jq '.[] | select(.user.login == "github-actions[bot]") | [(.id | tostring), (.body | .[0:200])] | @tsv' \
            2>/dev/null | while IFS=$'\t' read -r cid preview; do
              [ -n "$cid" ] || continue
              check_reactions "$cid" "issues/comments" "$PR_NUM" "$PR_TITLE" "$preview"
            done

            # Inline review comments
            gh api "repos/${REPO}/pulls/${PR_NUM}/comments" --paginate \
              --jq '.[] | select(.user.login == "github-actions[bot]") | [(.id | tostring), (.body | .[0:200])] | @tsv' \
            2>/dev/null | while IFS=$'\t' read -r cid preview; do
              [ -n "$cid" ] || continue
              check_reactions "$cid" "pulls/comments" "$PR_NUM" "$PR_TITLE" "$preview"
            done
          done

          echo "Reaction poll complete"
