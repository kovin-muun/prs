name: Claude Auto Review with Tracking
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

env:
  MAX_DIFF_LINES: 10000

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Check diff size
        id: diff-check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DIFF_LINES=$(gh pr diff ${{ github.event.pull_request.number || github.event.inputs.pr_number }} | wc -l)
          echo "diff_lines=$DIFF_LINES" >> "$GITHUB_OUTPUT"
          if [ "$DIFF_LINES" -gt "$MAX_DIFF_LINES" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping Claude review — diff is $DIFF_LINES lines (limit: $MAX_DIFF_LINES)"
            gh pr comment ${{ github.event.pull_request.number || github.event.inputs.pr_number }} --body "⚠️ **Claude review skipped** — this PR's diff is $DIFF_LINES lines, which exceeds the $MAX_DIFF_LINES-line limit. Please request a manual review."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: anthropics/claude-code-action@v1
        id: claude-review
        if: steps.diff-check.outputs.skip != 'true'
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: ${{ github.event_name == 'pull_request' }}
          show_full_output: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}

            Please review this pull request with a focus on:
            - Code quality and best practices
            - Potential bugs or issues
            - Security implications
            - Performance considerations

            Provide detailed feedback using inline comments for specific issues.

            You must post the review summary and any inline comments in the corresponding PR.

          claude_args: |
            --model claude-opus-4-6 --max-turns 10 --max-budget-usd 1.5 --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash,Read,Glob,Grep"

      - name: Post model usage to PR
        if: steps.diff-check.outputs.skip != 'true' && steps.claude-review.outputs.execution_file != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          EXEC_FILE="${{ steps.claude-review.outputs.execution_file }}"

          if [ -f "$EXEC_FILE" ]; then
            USAGE=$(jq '.modelUsage // empty' "$EXEC_FILE" 2>/dev/null)
            if [ -n "$USAGE" ]; then
              TOTAL_COST=$(echo "$USAGE" | jq '[.[].costUSD] | add // 0' 2>/dev/null)
              TOTAL_INPUT=$(echo "$USAGE" | jq '[.[].inputTokens] | add // 0' 2>/dev/null)
              TOTAL_OUTPUT=$(echo "$USAGE" | jq '[.[].outputTokens] | add // 0' 2>/dev/null)
              TOTAL_CACHE_READ=$(echo "$USAGE" | jq '[.[].cacheReadInputTokens] | add // 0' 2>/dev/null)
              TOTAL_CACHE_CREATE=$(echo "$USAGE" | jq '[.[].cacheCreationInputTokens] | add // 0' 2>/dev/null)

              BODY=$(cat <<EOF
          📊 **Claude Review — Model Usage**

          | Metric | Value |
          |--------|-------|
          | **Total Cost** | \$${TOTAL_COST} |
          | **Input Tokens** | ${TOTAL_INPUT} |
          | **Output Tokens** | ${TOTAL_OUTPUT} |
          | **Cache Read Tokens** | ${TOTAL_CACHE_READ} |
          | **Cache Creation Tokens** | ${TOTAL_CACHE_CREATE} |

          <details>
          <summary>Raw usage JSON</summary>

          \`\`\`json
          $(echo "$USAGE" | jq '.')
          \`\`\`
          </details>
          EOF
              )

              gh pr comment "$PR_NUMBER" --body "$BODY"
            else
              echo "::warning::No modelUsage found in execution file"
            fi
          else
            echo "::warning::Execution file not found at $EXEC_FILE"
          fi
