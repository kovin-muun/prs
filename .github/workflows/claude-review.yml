name: Claude Auto Review with Tracking
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

env:
  MAX_DIFF_LINES: 10000

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Check diff size
        id: diff-check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DIFF_LINES=$(gh pr diff ${{ github.event.pull_request.number || github.event.inputs.pr_number }} | wc -l)
          echo "diff_lines=$DIFF_LINES" >> "$GITHUB_OUTPUT"
          if [ "$DIFF_LINES" -gt "$MAX_DIFF_LINES" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping Claude review — diff is $DIFF_LINES lines (limit: $MAX_DIFF_LINES)"
            gh pr comment ${{ github.event.pull_request.number || github.event.inputs.pr_number }} --body "⚠️ **Claude review skipped** — this PR's diff is $DIFF_LINES lines, which exceeds the $MAX_DIFF_LINES-line limit. Please request a manual review."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: anthropics/claude-code-action@v1
        if: steps.diff-check.outputs.skip != 'true'
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: false
          show_full_output: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}

            Please review this pull request with a focus on:
            - Code quality and best practices
            - Potential bugs or issues
            - Security implications
            - Performance considerations

            Provide detailed feedback using inline comments for specific issues.

            IMPORTANT:
              1. only comment on changes that are actually present in the PR diff. Before posting any finding,                                                               
            verify that the file and specific change you are referencing actually appear in `gh pr diff`. Do not                                                                   
            infer, assume, or fabricate changes that are not visible in the diff. If you cannot point to a specific                                                                
            diff hunk for a finding, do not post it.
              2. don't be sycophantic in the feedback and rather address issues that need attention in a straight direct manner.
              3. only provide feedback about issues that need to be addressed, not feedback about a work well done.
              4. don't repeat feedback already given for previous pushes in this PR.
              5. if you don't have new things to say, then don't post any new comment.

          claude_args: |
            --model claude-opus-4-6 --max-turns 10 --max-budget-usd 1.5 --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash,Read,Glob,Grep"
